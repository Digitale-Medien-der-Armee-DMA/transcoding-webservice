services:
  app:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: transcoding_webservice
      DB_USERNAME: transcoding_webservice
      DB_PASSWORD: transcoding_webservice

  worker-download:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: transcoding_webservice
      DB_USERNAME: transcoding_webservice
      DB_PASSWORD: transcoding_webservice

  worker-video-gpu:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: transcoding_webservice
      DB_USERNAME: transcoding_webservice
      DB_PASSWORD: transcoding_webservice

  scheduler:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: transcoding_webservice
      DB_USERNAME: transcoding_webservice
      DB_PASSWORD: transcoding_webservice

  db:
    image: mariadb:10.11
    environment:
      MARIADB_DATABASE: transcoding_webservice
      MARIADB_USER: transcoding_webservice
      MARIADB_PASSWORD: transcoding_webservice
      MARIADB_ROOT_PASSWORD: transcoding_webservice_root
    volumes:
      - dev-db-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-utranscoding_webservice", "-ptranscoding_webservice"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

volumes:
  dev-db-data:
