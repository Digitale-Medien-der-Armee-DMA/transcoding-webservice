name: transcoding-webservice

services:
  app:
    image: transcoding-webservice-app:${APP_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: docker/production/Dockerfile.app
    env_file:
      - path: .env
        required: false
    environment:
      WAIT_FOR_DB: "true"
      WAIT_FOR_REDIS: "${HEALTH_REDIS_REQUIRED:-false}"
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
      - uploaded-media:/var/www/html/storage/app/public/uploaded
      - converted-media:/var/www/html/storage/app/public/converted
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$s=@fsockopen(\"127.0.0.1\",9000); exit($$s?0:1);'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal

  web:
    image: transcoding-webservice-web:${APP_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: docker/production/Dockerfile.nginx
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_BIND:-127.0.0.1:8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/internal/health/live | grep -q '\"status\":\"ok\"'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal

  worker-download:
    image: transcoding-webservice-app:${APP_IMAGE_TAG:-local}
    env_file:
      - path: .env
        required: false
    environment:
      WAIT_FOR_DB: "true"
      WAIT_FOR_REDIS: "${HEALTH_REDIS_REQUIRED:-false}"
    command:
      - php
      - artisan
      - queue:work
      - --queue=download
      - --sleep=${WORKER_SLEEP:-3}
      - --tries=${WORKER_TRIES:-3}
      - --timeout=${WORKER_DOWNLOAD_TIMEOUT:-84600}
      - --memory=${WORKER_MEMORY:-1024}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
      - uploaded-media:/var/www/html/storage/app/public/uploaded
      - converted-media:/var/www/html/storage/app/public/converted
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "artisan", "--version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  worker-video-gpu:
    image: transcoding-webservice-app:${APP_IMAGE_TAG:-local}
    env_file:
      - path: .env
        required: false
    environment:
      WAIT_FOR_DB: "true"
      WAIT_FOR_REDIS: "${HEALTH_REDIS_REQUIRED:-false}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility,video}"
    command:
      - php
      - artisan
      - queue:work
      - --queue=video
      - --sleep=${WORKER_SLEEP:-3}
      - --tries=${WORKER_TRIES:-3}
      - --timeout=${WORKER_VIDEO_TIMEOUT:-84600}
      - --memory=${WORKER_MEMORY:-1024}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
      - uploaded-media:/var/www/html/storage/app/public/uploaded
      - converted-media:/var/www/html/storage/app/public/converted
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_DEVICE_COUNT:-1}
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "artisan", "--version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  scheduler:
    image: transcoding-webservice-app:${APP_IMAGE_TAG:-local}
    env_file:
      - path: .env
        required: false
    environment:
      WAIT_FOR_DB: "true"
      WAIT_FOR_REDIS: "${HEALTH_REDIS_REQUIRED:-false}"
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
      - uploaded-media:/var/www/html/storage/app/public/uploaded
      - converted-media:/var/www/html/storage/app/public/converted
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "artisan", "--version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - internal

volumes:
  app-storage:
  app-cache:
  uploaded-media:
  converted-media:
  redis-data:

networks:
  internal:
    driver: bridge
